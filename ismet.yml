openapi: 3.0.3
info:
  title: E-Ticaret ve Program Yönetim API'si
  version: 1.0.0
  description: >
    Bu API kullanıcı yönetimi, ürün yönetimi, sepet işlemleri,
    sipariş oluşturma ve haftalık program planlama işlemlerini
    sağlayan RESTful bir servistir.
  contact:
    name: Öğrenci
    email: ogrenci@example.com

servers:
  - url: https://api.vercel.com
    description: Production
  - url: https://staging-api.vercel.com
    description: Staging
  - url: https://localhost:3000
    description: Development

tags:
  - name: Auth
    description: Kullanıcı kayıt ve giriş işlemleri
  - name: Users
    description: Kullanıcı profil işlemleri
  - name: Products
    description: Ürün yönetimi
  - name: Cart
    description: Sepet işlemleri
  - name: Orders
    description: Sipariş işlemleri
  - name: WeeklyProgram
    description: Haftalık program işlemleri

paths:

  /auth/register:
    post:
      tags:
        - Auth
      summary: Kullanıcı Kayıt
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
        "400":
          description: Geçersiz veri

  /auth/login:
    post:
      tags:
        - Auth
      summary: Kullanıcı Girişi
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        "200":
          description: Giriş başarılı
        "401":
          description: Hatalı email veya şifre

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string

    get:
      tags:
        - Users
      summary: Profil Görüntüleme
      operationId: getUser
      responses:
        "200":
          description: Kullanıcı bilgileri getirildi

    put:
      tags:
        - Users
      summary: Profil Güncelleme
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        "200":
          description: Kullanıcı güncellendi

    delete:
      tags:
        - Users
      summary: Hesap Silme
      operationId: deleteUser
      responses:
        "204":
          description: Kullanıcı silindi

  /products:
    get:
      tags:
        - Products
      summary: Ürün Listeleme
      operationId: listProducts
      responses:
        "200":
          description: Ürün listesi

    post:
      tags:
        - Products
      summary: Ürün Ekle
      operationId: addProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        "201":
          description: Ürün oluşturuldu

  /products/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string

    put:
      tags:
        - Products
      summary: Ürün Güncelle
      operationId: updateProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        "200":
          description: Ürün güncellendi

    delete:
      tags:
        - Products
      summary: Ürün Sil
      operationId: deleteProduct
      responses:
        "204":
          description: Ürün silindi

  /cart:
    post:
      tags:
        - Cart
      summary: Sepete Ürün Ekle
      operationId: addToCart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartInput'
      responses:
        "200":
          description: Ürün sepete eklendi

    get:
      tags:
        - Cart
      summary: Sepeti Görüntüle
      operationId: getCart
      responses:
        "200":
          description: Sepet listesi

  /orders:
    post:
      tags:
        - Orders
      summary: Sipariş Oluştur
      operationId: createOrder
      responses:
        "201":
          description: Sipariş oluşturuldu

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string

    get:
      tags:
        - Orders
      summary: Sipariş Görüntüle
      operationId: getOrder
      responses:
        "200":
          description: Sipariş detayları

  /weekly-program:
    post:
      tags:
        - WeeklyProgram
      summary: Haftalık Program Oluştur
      operationId: createProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
      responses:
        "201":
          description: Program oluşturuldu

  /weekly-program/{programId}:
    parameters:
      - name: programId
        in: path
        required: true
        schema:
          type: string

    put:
      tags:
        - WeeklyProgram
      summary: Haftalık Program Güncelle
      operationId: updateProgram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProgramInput'
      responses:
        "200":
          description: Program güncellendi

components:

  schemas:

    RegisterInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    LoginInput:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    UserInput:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string

    ProductInput:
      type: object
      properties:
        name:
          type: string
        price:
          type: number
        stock:
          type: integer

    CartInput:
      type: object
      properties:
        productId:
          type: string
        quantity:
          type: integer

    ProgramInput:
      type: object
      properties:
        day:
          type: string
        activity:
          type: string